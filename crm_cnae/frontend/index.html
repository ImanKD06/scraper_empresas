<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM CNAE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#0F1729;--ink2:#1a2744;--blue:#2563EB;--blue2:#1D4ED8;
  --teal:#0D9488;--violet:#7C3AED;--green:#059669;--red:#DC2626;
  --amber:#D97706;--gray:#64748B;--g2:#94A3B8;--border:#E2E8F0;
  --surf:#F8FAFC;--white:#fff;--text:#0F172A;--t2:#334155;
  --f:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--f);background:var(--ink);color:var(--text);overflow:hidden}
/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:232px;background:var(--ink2);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.05)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--surf)}
#top{height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:12px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
#cnt{flex:1;overflow-y:auto;padding:1.5rem}
/* ── SIDEBAR ── */
.sbl{padding:1.1rem 1rem .9rem;border-bottom:1px solid rgba(255,255,255,.07)}
.sbm{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px}
.sbn{font-size:17px;font-weight:700;color:#fff;margin-top:2px;letter-spacing:-.5px}
.sbr{display:inline-block;font-size:10px;padding:2px 9px;border-radius:10px;margin-top:5px;font-weight:600}
.ra{background:rgba(124,58,237,.2);color:#C4B5FD}
.rs{background:rgba(13,148,136,.2);color:#5EEAD4}
.rc{background:rgba(37,99,235,.2);color:#93C5FD}
.sbnav{flex:1;padding:5px 0;overflow-y:auto}
.sbsc{padding:.85rem 1rem .2rem;font-size:10px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.5px}
.sbi{display:flex;align-items:center;gap:9px;padding:8px 1rem;cursor:pointer;color:rgba(255,255,255,.48);font-size:13px;font-weight:500;transition:all .12s;border-left:3px solid transparent}
.sbi:hover{color:#fff;background:rgba(255,255,255,.05)}
.sbi.on{color:#fff;background:rgba(255,255,255,.08);border-left-color:#60A5FA}
.sbic{width:18px;text-align:center;flex-shrink:0;font-size:14px}
.sbf{padding:.9rem 1rem;border-top:1px solid rgba(255,255,255,.07)}
.sbu{display:flex;align-items:center;gap:9px}
.sbav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sbun{font-size:12px;color:#fff;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbur{font-size:10px;color:rgba(255,255,255,.35)}
.out-btn{background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:18px;padding:2px;transition:color .12s}
.out-btn:hover{color:#fff}
/* ── TOPBAR ── */
.tbt{font-size:14px;font-weight:700;color:var(--text);flex:1}
.tbb{font-family:var(--mono);font-size:10px;padding:3px 10px;background:var(--surf);border:1px solid var(--border);border-radius:20px;color:var(--gray)}
/* ── LOGIN ── */
#login{position:fixed;inset:0;background:#060D1A;display:flex;align-items:center;justify-content:center;z-index:100}
#login::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(37,99,235,.035) 47px,rgba(37,99,235,.035) 48px),
             repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(37,99,235,.035) 47px,rgba(37,99,235,.035) 48px);
  pointer-events:none}
.lbox{background:#fff;border-radius:18px;padding:2.5rem;width:100%;max-width:390px;position:relative;z-index:1;box-shadow:0 24px 64px rgba(0,0,0,.45)}
.lbrand{text-align:center;margin-bottom:2rem}
.lmark{font-family:var(--mono);font-size:10px;color:var(--gray);letter-spacing:2px;text-transform:uppercase}
.ltit{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.5px;margin-top:4px}
.lsub{font-size:13px;color:var(--gray);margin-top:5px}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.lf label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.lf input{padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:var(--f);font-size:14px;color:var(--text)}
.lf input:focus{outline:none;border-color:var(--blue)}
.lbtn{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:9px;font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer;margin-top:5px;transition:all .15s}
.lbtn:hover{background:var(--ink2);transform:translateY(-1px)}
.lbtn:disabled{opacity:.5;transform:none;cursor:not-allowed}
.lerr{background:#FEF2F2;border:1px solid #FECACA;color:var(--red);border-radius:8px;padding:9px 13px;font-size:13px;margin-bottom:10px;display:none}
.ldemo{margin-top:1.4rem;padding-top:1.4rem;border-top:1px solid var(--border)}
.ldemo p{font-size:10px;color:var(--gray);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.lpills{display:flex;gap:6px}
.lpill{flex:1;padding:6px;background:var(--surf);border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:var(--mono);color:var(--gray);cursor:pointer;text-align:center;transition:all .12s}
.lpill:hover{border-color:var(--blue);color:var(--blue)}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:7px;font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s;white-space:nowrap}
.bp{background:var(--ink);color:#fff}.bp:hover{background:var(--ink2);transform:translateY(-1px)}
.bb{background:var(--blue);color:#fff}.bb:hover{background:var(--blue2)}
.bg{background:transparent;color:var(--gray);border:1.5px solid var(--border)}.bg:hover{background:var(--surf)}
.br{background:var(--red);color:#fff}
.bgr{background:var(--green);color:#fff}
.bt{background:var(--teal);color:#fff}
.sm{padding:5px 11px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:11px;margin-bottom:1.4rem}
.kpi{background:#fff;border-radius:11px;border:1px solid var(--border);padding:.9rem}
.kl{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kv{font-size:26px;font-weight:700;letter-spacing:-1px}
.ks{font-size:10px;color:var(--g2);margin-top:2px}
/* ── TABLE ── */
.tw{overflow-x:auto;border-radius:11px;border:1px solid var(--border);margin-bottom:1.2rem}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;background:var(--surf);border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:10px 13px;color:var(--t2);border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#F1F5F9}
.cn{font-weight:600;color:var(--text);max-width:210px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-family:var(--mono);font-size:11px;color:var(--gray)}
/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bn{background:#F1F5F9;color:var(--gray)}
.bc{background:#DBEAFE;color:#1D4ED8}
.bi{background:#FEF3C7;color:var(--amber)}
.bng{background:#F3E8FF;color:var(--violet)}
.bcl{background:#D1FAE5;color:var(--green)}
.bd{background:#FEE2E2;color:var(--red)}
.bcrec{background:#D1FAE5;color:var(--green)}
.bdec{background:#FEE2E2;color:var(--red)}
.best{background:#FEF3C7;color:var(--amber)}
.badm{background:rgba(124,58,237,.1);color:var(--violet)}
.bsup{background:rgba(13,148,136,.1);color:var(--teal)}
.bcom{background:rgba(37,99,235,.1);color:var(--blue)}
.bpend{background:#F1F5F9;color:var(--gray)}
.bscr{background:#DBEAFE;color:var(--blue)}
.bdone{background:#D1FAE5;color:var(--green)}
.berr{background:#FEE2E2;color:var(--red)}
.tlic{display:inline-block;padding:2px 6px;background:#EDE9FE;color:var(--violet);border-radius:4px;font-size:10px;font-weight:600;margin-left:3px}
/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.modal.wide{max-width:680px}
.mhd{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhd h2{font-size:15px;font-weight:700;color:var(--text)}
.mbd{padding:1.4rem;overflow-y:auto;flex:1}
.mft{padding:.9rem 1.4rem;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);line-height:1;padding:0 4px}
/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--f);font-size:13px;color:var(--text);background:#fff;transition:border-color .12s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue)}
.fg select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='11' height='7' viewBox='0 0 11 7' fill='none'%3E%3Cpath d='M1 1L5.5 6L10 1' stroke='%2364748B' stroke-width='1.4' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
.fg textarea{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.ff{grid-column:1/-1}
.g2 .fg{margin-bottom:0}
/* ── PROGRESS ── */
.pb{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--blue),var(--violet));border-radius:3px;transition:width .5s}
/* ── MISC ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;gap:12px;flex-wrap:wrap}
.st{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.fb{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:.9rem}
.fi{padding:7px 28px 7px 11px;border:1.5px solid var(--border);border-radius:7px;font-family:var(--f);font-size:13px;color:var(--text);background:#fff url("data:image/svg+xml,%3Csvg width='11' height='7' viewBox='0 0 11 7' fill='none'%3E%3Cpath d='M1 1L5.5 6L10 1' stroke='%2364748B' stroke-width='1.4' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat right 9px center;appearance:none;cursor:pointer}
.warn{background:#FFFBEB;border:1px solid #FDE68A;border-radius:9px;padding:11px 14px;font-size:12px;color:#92400E;margin-bottom:.9rem}
.ibox{background:var(--surf);border-radius:9px;padding:.9rem;margin-bottom:1rem;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:12px}
.il{font-size:10px;color:var(--gray);text-transform:uppercase;margin-bottom:2px}
.iv{font-weight:600;color:var(--text)}
.ar{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.at{background:var(--surf);border-radius:5px;padding:2px 7px;font-size:11px;color:var(--gray);white-space:nowrap}
.div{height:1px;background:var(--border);margin:.9rem 0}
.es{text-align:center;padding:3rem 1rem;color:var(--gray)}
.spi{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
.spid{width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
/* ── TOAST ── */
#ts{position:fixed;top:1rem;right:1rem;z-index:300;display:flex;flex-direction:column;gap:7px}
.toast{padding:10px 15px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:tin .3s ease;max-width:300px}
.tok{background:#D1FAE5;color:var(--green);border:1px solid #A7F3D0}
.ter{background:#FEE2E2;color:var(--red);border:1px solid #FECACA}
.tin{background:#DBEAFE;color:var(--blue2);border:1px solid #BFDBFE}
@keyframes tin{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div id="ts"></div>
<div id="mc"></div>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div class="lbrand">
      <div class="lmark">CRM · CNAE</div>
      <div class="ltit">Bienvenido</div>
      <div class="lsub">Panel de gestión comercial</div>
    </div>
    <div id="lerr" class="lerr"></div>
    <div class="lf"><label>Email</label>
      <input id="lem" type="email" value="admin@crm.es" placeholder="tu@email.com"/></div>
    <div class="lf"><label>Contraseña</label>
      <input id="lpw" type="password" value="admin123" placeholder="••••••••"/></div>
    <button class="lbtn" id="lbtn" onclick="doLogin()">Entrar</button>
    <div class="ldemo">
      <p>Acceso rápido</p>
      <div class="lpills">
        <div class="lpill" onclick="setLogin('admin@crm.es','admin123')">Admin</div>
        <div class="lpill" onclick="setLogin('supervisor@crm.es','admin123')">Supervisor</div>
        <div class="lpill" onclick="setLogin('comercial@crm.es','admin123')">Comercial</div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="sb">
    <div class="sbl">
      <div class="sbm">CRM · CNAE</div>
      <div class="sbn">LeadScraper</div>
      <span class="sbr" id="sbrb"></span>
    </div>
    <nav class="sbnav" id="sbnav"></nav>
    <div class="sbf">
      <div class="sbu">
        <div class="sbav" id="sbav"></div>
        <div style="flex:1;min-width:0">
          <div class="sbun" id="sbun"></div>
          <div class="sbur" id="sbur"></div>
        </div>
        <button class="out-btn" onclick="logout()" title="Salir">⇥</button>
      </div>
    </div>
  </div>
  <div id="main">
    <div id="top">
      <div class="tbt" id="tbt">Dashboard</div>
      <span class="tbb" id="tbb">–</span>
    </div>
    <div id="cnt"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api';
let S = { user:null, token:null, view:null };

// ── Helpers ────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const vv = id => { const e=$(id); return e ? e.value : ''; };
const setContent = h => $('cnt').innerHTML = h;
const setTop = (t,b) => { $('tbt').textContent=t; $('tbb').textContent=b; };
function setLogin(e,p){ $('lem').value=e; $('lpw').value=p; }

// ── API ────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (r.status === 401) { logout(); return null; }
  if (!r.ok) {
    const e = await r.json().catch(() => ({detail: r.statusText}));
    throw new Error(e.detail || 'Error del servidor');
  }
  const ct = r.headers.get('content-type') || '';
  return ct.includes('json') ? r.json() : r.blob();
}

// ── Toast ──────────────────────────────────────────────────
function toast(msg, t='in') {
  const el = document.createElement('div');
  el.className = `toast t${t}`;
  el.textContent = msg;
  $('ts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Modal ──────────────────────────────────────────────────
function openModal(html, wide=false) {
  $('mc').innerHTML = `<div class="ov" onclick="if(event.target===this)closeModal()">
    <div class="modal${wide?' wide':''}">${html}</div></div>`;
}
function closeModal() { $('mc').innerHTML = ''; }

// ── Login ──────────────────────────────────────────────────
$('lpw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const btn = $('lbtn'), err = $('lerr');
  btn.disabled = true;
  btn.innerHTML = '<div class="spi"></div> Entrando...';
  err.style.display = 'none';
  try {
    const d = await api('POST', '/login', {email:$('lem').value, password:$('lpw').value});
    S.token = d.token; S.user = d.user;
    localStorage.setItem('crm_tk', d.token);
    initApp();
  } catch(e) {
    err.textContent = e.message; err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

function logout() {
  S.token=null; S.user=null;
  localStorage.removeItem('crm_tk');
  $('app').style.display='none';
  $('login').style.display='flex';
}

async function autoLogin() {
  const tk = localStorage.getItem('crm_tk');
  if (!tk) return;
  S.token = tk;
  try { S.user = await api('GET', '/yo'); if(S.user) initApp(); }
  catch { localStorage.removeItem('crm_tk'); }
}

// ── App init ───────────────────────────────────────────────
function initApp() {
  $('login').style.display='none';
  $('app').style.display='flex';
  const u = S.user;
  const ini = (u.nombre[0]+(u.apellidos?u.apellidos[0]:u.nombre[1]||'')).toUpperCase();
  const rc = {admin:'#7C3AED',supervisor:'#0D9488',comercial:'#2563EB'}[u.rol]||'#2563EB';
  $('sbav').textContent = ini;
  $('sbav').style.background = rc+'20';
  $('sbav').style.color = rc;
  $('sbun').textContent = u.nombre + (u.apellidos ? ' '+u.apellidos : '');
  $('sbur').textContent = u.rol[0].toUpperCase()+u.rol.slice(1);
  const rb = $('sbrb');
  rb.textContent = u.rol;
  rb.className = `sbr r${u.rol[0]}`;
  buildNav();
  go({admin:'dash', supervisor:'sdash', comercial:'cemp'}[u.rol]||'dash');
}

function buildNav() {
  const r = S.user.rol;
  const navs = {
    admin: [
      {s:'Administración'},
      {id:'dash',  i:'⬡', l:'Dashboard'},
      {id:'users', i:'👥', l:'Usuarios'},
      {id:'asig',  i:'📋', l:'Asignaciones CNAE'},
      {id:'emps',  i:'🏢', l:'Empresas'},
      {s:'Supervisión'},
      {id:'sdash', i:'📊', l:'Actividad Global'},
      {id:'sleads',i:'🎯', l:'Todos los Leads'},
    ],
    supervisor: [
      {s:'Supervisión'},
      {id:'sdash', i:'⬡', l:'Dashboard'},
      {id:'sleads',i:'🎯', l:'Todos los Leads'},
      {id:'emps',  i:'🏢', l:'Empresas'},
      {id:'asig',  i:'📋', l:'Asignaciones'},
    ],
    comercial: [
      {s:'Mi Panel'},
      {id:'cemp',  i:'⬡', l:'Mis Empresas'},
      {id:'cleads',i:'🎯', l:'Mis Leads'},
    ],
  };
  $('sbnav').innerHTML = (navs[r]||[]).map(n => {
    if (n.s) return `<div class="sbsc">${n.s}</div>`;
    return `<div class="sbi" id="ni${n.id}" onclick="go('${n.id}')">
      <span class="sbic">${n.i}</span>${n.l}</div>`;
  }).join('');
}

function go(vid) {
  S.view = vid;
  document.querySelectorAll('.sbi').forEach(el => el.classList.toggle('on', el.id==='ni'+vid));
  ({dash:pDash, users:pUsers, asig:pAsig, emps:pEmps,
    sdash:pSDash, sleads:pSLeads,
    cemp:pCEmp, cleads:pCLeads}[vid]||pDash)();
}

// ════════════════════════════════════════════
//  PANEL ADMIN — DASHBOARD
// ════════════════════════════════════════════
async function pDash() {
  setTop('Dashboard','Admin');
  setContent(`<div class="kpis" id="kp"><div style="text-align:center;padding:2rem"><div class="spid"></div></div></div>

async function updateUser(id) {
  const pw = vv('ep');
  const d = {nombre:vv('en'),apellidos:vv('ea'),email:vv('ee'),
              rol:vv('er'),activo:parseInt(vv('eac'))};
  if (pw) d.password = pw;
  try {
    await api('PUT',`/usuarios/${id}`,d);
    toast('Actualizado ✓','ok'); closeModal(); loadUsers();
  } catch(e) { toast(e.message,'er'); }
}

async function delUser(id) {
  if (!confirm('¿Desactivar este usuario?')) return;
  try { await api('DELETE',`/usuarios/${id}`); toast('Desactivado','ok'); loadUsers(); }
  catch(e) { toast(e.message,'er'); }
}

function setDesc() {

async function createAsig() {

  const com = vv('acom');
  try {
    await api('POST','/asignaciones',{
      nombre: vv('an')||`CNAE ${cn} · ${pv}`,
      cnae:cn, cnae_desc:vv('ads'), provincia:pv,
      paginas:parseInt(vv('apg'))||1,
      comercial_id: com?parseInt(com):null,
    });
    toast('Scraping iniciado en background ✓','ok');
    closeModal(); pAsig();
  } catch(e) { toast(e.message,'er'); }

async function dlxl(aid) {
  try {
    toast('Generando Excel...','in');
    const blob = await api('GET',`/asignaciones/${aid}/excel`);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`export_${aid}.xlsx`; a.click();
    URL.revokeObjectURL(url);
    toast('Excel descargado ✓','ok');
  } catch(e) { toast(e.message,'er'); }
}

async function openL4e(eid) {
  try {
    const rows = await api('GET','/leads');
    const l = rows.find(r=>r.empresa_id===eid);
    if(l) mLead(l); else await mkOpenLead(eid);
  } catch(e) { toast(e.message,'er'); }
}

// ════════════════════════════════════════════
//  COMERCIAL — MIS LEADS
// ════════════════════════════════════════════
async function pCLeads() {
  setTop('Mis Leads','Panel Comercial');
  setContent(`<div class="fb">
    <select class="fi" id="cle" onchange="loadCLeads()"><option value="">Todos los estados</option>
      <option>nuevo</option><option>contactado</option><option>interesado</option>
      <option>negociacion</option><option>cliente</option><option>descartado</option>
    </select>
  </div><div id="clt"></div>`);
  loadCLeads();
}

async function loadCLeads() {
  const est = vv('cle');
  const p = new URLSearchParams(); if(est) p.set('estado',est);
  try {
    const rows = await api('GET',`/leads?${p}`);
    renderLeads('clt', rows, true);
  } catch(e) { toast(e.message,'er'); }
}

// ════════════════════════════════════════════
//  TABLA LEADS COMPARTIDA
// ════════════════════════════════════════════
function renderLeads(elId, rows, isComercial) {
  const el=$(elId); if(!el) return;
  if(!rows.length){
    el.innerHTML='<div class="es"><div style="font-size:36px;opacity:.4">🎯</div><p style="margin-top:1rem">No hay leads.</p></div>';
    return;
  }
  el.innerHTML = `<div class="tw"><table><thead><tr>
    <th>Empresa</th>${!isComercial?'<th>Comercial</th>':''}
    <th>Estado</th><th>Interés</th><th>Contacto</th>
    <th>Teléfono</th><th>Dirección</th><th>Gerente</th>
    <th>Facturación</th><th>Tendencia</th><th>Licita</th>
    <th>Notas</th><th>Próx. acción</th><th>Acción</th>
  </tr></thead><tbody>
  ${rows.map(l=>`<tr>
    <td>
      <div class="cn">${l.emp_nom||'—'}</div>
      <div class="cm">${l.provincia||''}</div>
    </td>
    ${!isComercial?`<td>${l.com_nom||'—'}</td>`:''}
    <td>${ebadge(l.estado)}</td>
    <td>${stars(l.interes)}</td>
    <td>
      <div style="font-size:12px;font-weight:600">${l.nombre_contacto||l.gerente||'—'}</div>
      <div class="cm">${l.cargo_contacto||l.cargo_gerente||''}</div>
    </td>
    <td class="cm">${l.telefono_contacto||l.emp_tel||'—'}</td>
    <td style="font-size:11px;color:var(--gray)">${l.municipio||l.provincia||'—'}</td>
    <td style="font-size:12px">${l.gerente||'—'}</td>
    <td class="cm">${l.facturacion_actual||'—'}</td>
    <td>${tbadge(l.tendencia,l.pct_cambio)}</td>
    <td>${l.licita?'<span class="tlic">✓</span>':''}</td>
    <td style="max-width:150px;font-size:11px;color:var(--gray)">${(l.notas||'').substring(0,60)}</td>
    <td style="font-size:11px;color:var(--violet)">${l.proxima_accion||'—'}</td>
    <td><button class="btn bb sm" onclick='mLead(${JSON.stringify(l).replace(/'/g,"&#39;")})'>✎ Gestionar</button></td>
  </tr>`).join('')}
  </tbody></table></div>`;
}

// ════════════════════════════════════════════
//  MODAL GESTIÓN LEAD (panel comercial)
// ════════════════════════════════════════════
function mLead(l) {
  openModal(`
    <div class="mhd"><h2>📋 ${l.emp_nom||'Lead'}</h2>
      <button class="mclose" onclick="closeModal()">×</button></div>
    <div class="mbd">
      <!-- Info empresa -->
      <div class="ibox">
        <div><div class="il">Ranking</div><div class="iv">#${l.ranking_posicion||'—'}</div></div>
        <div><div class="il">CNAE</div><div class="iv">${l.cnae||'—'}</div></div>
        <div><div class="il">Provincia</div><div class="iv">${l.provincia||'—'}</div></div>
        <div><div class="il">Facturación</div><div class="iv">${l.facturacion_actual||'—'}</div></div>
        <div><div class="il">Tendencia</div><div class="iv">${tbadge(l.tendencia,l.pct_cambio)}</div></div>
        <div><div class="il">Licita</div><div class="iv">${l.licita?'<span class="tlic">Sí</span>':'No'}</div></div>
      </div>
      <!-- CRM Fields -->
      <div class="g2">
        <div class="fg"><label>Estado CRM</label><select id="lest">
          ${['nuevo','contactado','interesado','negociacion','cliente','descartado'].map(s=>
            `<option value="${s}" ${l.estado===s?'selected':''}>${s[0].toUpperCase()+s.slice(1)}</option>`
          ).join('')}
        </select></div>
        <div class="fg"><label>Interés ★</label><select id="lint">
          <option value="0">Sin valorar</option>
          ${[1,2,3,4,5].map(n=>`<option value="${n}" ${l.interes==n?'selected':''}>${'★'.repeat(n)} (${n}/5)</option>`).join('')}
        </select></div>
        <div class="fg"><label>Nombre contacto / Gerente</label>
          <input id="lnc" value="${l.nombre_contacto||l.gerente||''}"/></div>
        <div class="fg"><label>Cargo</label>
          <input id="lcc" value="${l.cargo_contacto||l.cargo_gerente||''}"/></div>
        <div class="fg"><label>Teléfono</label>
          <input id="ltc" value="${l.telefono_contacto||l.emp_tel||''}"/></div>
        <div class="fg"><label>Email</label>
          <input id="lec" value="${l.email_contacto||l.emp_email||''}"/></div>
        <div class="fg ff"><label>Dirección / Municipio</label>
          <input id="ldi" value="${l.municipio||''}"/></div>
        <div class="fg ff"><label>Próxima acción</label>
          <input id="lac" value="${l.proxima_accion||''}"/></div>
        <div class="fg ff"><label>Notas</label>
          <textarea id="lno" rows="3">${l.notas||''}</textarea></div>
      </div>
      <!-- Actividades -->
      <div class="div"></div>
      <div style="font-weight:600;font-size:13px;margin-bottom:9px">Registrar actividad</div>
      <div class="g2">
        <div class="fg"><label>Tipo</label><select id="ati">
          <option>llamada</option><option>email</option><option>reunion</option><option>nota</option>
        </select></div>
        <div class="fg"><label>Resultado</label>
          <input id="are" placeholder="Ej: Le interesa, llamar el martes"/></div>
        <div class="fg ff"><label>Descripción</label>
          <textarea id="ade" rows="2" placeholder="Detalles de la conversación..."></textarea></div>
      </div>
      <button class="btn bt sm" onclick="saveAct(${l.id})">+ Registrar actividad</button>
      <div id="acts" style="margin-top:10px"></div>
    </div>
    <div class="mft">
      <button class="btn bg" onclick="closeModal()">Cerrar</button>
      <button class="btn bp" onclick="saveLead(${l.id})">💾 Guardar cambios</button>
    </div>
  `, true);
  loadActs(l.id);
}

async function saveLead(lid) {
  try {
    await api('PUT',`/leads/${lid}`,{
      estado:vv('lest'),
      interes:parseInt(vv('lint'))||0,
      nombre_contacto:vv('lnc'), cargo_contacto:vv('lcc'),
      telefono_contacto:vv('ltc'), email_contacto:vv('lec'),
      proxima_accion:vv('lac'), notas:vv('lno'),
    });
    toast('Lead guardado ✓','ok'); closeModal();
    if(S.view==='cleads') loadCLeads();
    if(S.view==='sleads') loadSLeads();
  } catch(e) { toast(e.message,'er'); }
}

async function saveAct(lid) {
  try {
    await api('POST',`/leads/${lid}/actividades`,{
      tipo:vv('ati'), descripcion:vv('ade'), resultado:vv('are'),
    });
    toast('Actividad registrada ✓','ok');
    $('ade').value=''; $('are').value='';
    loadActs(lid);
  } catch(e) { toast(e.message,'er'); }
}

async function loadActs(lid) {
  const el=$('acts'); if(!el) return;
  try {
    const rows = await api('GET',`/leads/${lid}/actividades`);
    if(!rows.length){
      el.innerHTML='<p style="font-size:12px;color:var(--gray)">Sin actividades aún.</p>';
      return;
    }
    el.innerHTML = rows.slice(0,6).map(a=>`
      <div class="ar">
        <span class="at">${a.tipo}</span>
        <div style="flex:1">
          <div style="font-size:12px;color:var(--t2)">${a.descripcion||''}</div>
          ${a.resultado?`<div style="font-size:11px;color:var(--violet)">${a.resultado}</div>`:''}
        </div>
        <span class="cm">${fdate(a.creado_en)}</span>
      </div>`).join('');
  } catch {}
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function kpi(l,v,s,bg='#F8FAFC',c='#0F1729'){
  return`<div class="kpi" style="background:${bg}">
    <div class="kl">${l}</div>
    <div class="kv" style="color:${c}">${v??0}</div>
    <div class="ks">${s}</div>
  </div>`;
}

function ebadge(e) {
  const m={nuevo:'bn',contactado:'bc',interesado:'bi',negociacion:'bng',cliente:'bcl',descartado:'bd'};
  return`<span class="badge ${m[e||'nuevo']||'bn'}">${e||'nuevo'}</span>`;
}

function sbadge(e) {
  const m={pendiente:'bpend',scrapeando:'bscr',completada:'bdone',error:'berr'};
  return`<span class="badge ${m[e]||'bpend'}">${e||'pendiente'}</span>`;
}

function tbadge(t,p) {
  if(!t||t==='sin datos') return`<span class="badge bn">—</span>`;
  const ic=t==='crecimiento'?'▲':t==='decrecimiento'?'▼':'—';
  const cl=t==='crecimiento'?'bcrec':t==='decrecimiento'?'bdec':'best';
  return`<span class="badge ${cl}">${ic} ${p||t}</span>`;
}

function stars(n) {
  if(!n||n==0) return'<span style="color:var(--g2)">—</span>';
  return`<span style="color:#F59E0B">${'★'.repeat(n)}</span><span style="color:#CBD5E1">${'★'.repeat(5-n)}</span>`;
}

function fdate(d) {
  if(!d) return'—';
  try{return new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'2-digit'});}
  catch{return'—';}
}

autoLogin();
